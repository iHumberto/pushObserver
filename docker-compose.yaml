# Example docker-compose.yaml for pushObserver deployment
#
# Usage:
#   mkdir -p config repos
#   docker compose up -d
#
# On first run, push-observer.yaml is auto-created in ./config/
# from the bundled template. Edit it to add your hooks and secrets,
# then restart: docker compose restart push-observer
#
# Volumes:
#   ./config     — push-observer.yaml and other config files
#   ./repos      — cloned repositories (persistent storage)
#   docker.sock  — required for docker compose up/down inside container
#   SSH key      — deploy key for private repos (optional)

services:
  push-observer:
    image: ghcr.io/humberto/push-observer:latest
    container_name: push-observer
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # Docker socket — required to run docker compose commands
      - /var/run/docker.sock:/var/run/docker.sock
      # Config directory — push-observer.yaml auto-created on first run
      - ./config:/home/webhook/.config
      # Repository storage — cloned repos live here
      - ./repos:/home/webhook/repos
      # Deploy key for private repos (optional — create key first)
      - ${HOME}/.ssh/push_observer_deploy_key:/home/webhook/.ssh/deploy_key:ro
    environment:
      - PUSH_OBSERVER_API_KEY=${PUSH_OBSERVER_API_KEY:-}
      - HMAC_SECRET_HOMELAB=${HMAC_SECRET_HOMELAB:-}
    networks:
      - apprise-net

  # Optional: Apprise for notifications (Slack, Telegram, Discord, etc.)
  # Uncomment to enable. See https://github.com/caronc/apprise for config.
  # apprise:
  #   image: caronc/apprise:latest
  #   container_name: apprise
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   networks:
  #     - apprise-net

networks:
  apprise-net:
    driver: bridge
