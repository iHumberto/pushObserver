name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=3m

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Coverage
        run: go tool cover -func=coverage.out

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: CGO_ENABLED=0 GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o push-observer-${{ matrix.goarch }} ./cmd/push-observer

      - name: Verify binary
        run: test -f push-observer-${{ matrix.goarch }} && file push-observer-${{ matrix.goarch }}
